# SwiftLint configuration — reference baseline for projects built with this toolkit.
# See standards/coding_standards.md for the rationale behind these rules.

disabled_rules:
  - todo                      # TODOs are tracked in the issue tracker, not the linter
  - trailing_whitespace       # handled by .editorconfig / formatter

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - weak_delegate

analyzer_rules:
  - unused_import
  - unused_declaration

excluded:
  - .build
  - DerivedData
  - Pods
  - "**/*.generated.swift"

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 2
  excluded: [id, x, y, to, vc, ok]

force_cast: error
force_try: error
force_unwrapping: warning
